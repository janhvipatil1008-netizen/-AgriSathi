services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: agrisathi
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agrisathi_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrisathi -d agrisathi_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── One-shot init: migrate DB + seed sources ────────────────────────────────

  migrate:
    build: .
    command: >
      sh -c "python -m alembic upgrade head && python -m scripts.seed"
    env_file: .env.docker
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Application services ────────────────────────────────────────────────────

  api:
    build: .
    command: >
      python -m uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    ports:
      - "8000:8000"
    env_file: .env.docker
    volumes:
      - ./data:/app/data        # raw file storage persists on host
      - ./logs:/app/logs        # logs visible on host
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    restart: unless-stopped

  scheduler:
    build: .
    command: python -m scheduler.runner
    env_file: .env.docker
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
